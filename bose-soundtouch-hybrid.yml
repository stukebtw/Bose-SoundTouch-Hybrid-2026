# ==============================================================================
# BOSE SOUNDTOUCH HYBRID 2026 V3.8.1
# ==============================================================================
# --- VERSION TAGGING ---
# Use the word 'latest' on the image line below to always pull the newest 
# release, or use a specific tag (e.g., :v3.4) to lock to a specific version.
# NOTE: My provided YML will always be coded with the specific new release.
#
# --- HOW TO UPDATE THIS APP ---
# METHOD A: NAS / GUI USERS (Clean Slate Update)
# To prevent ghost bugs, you should perform a "Clean Reset".
# Your Docker interface needs to perform the following 5 steps:
#   1. Stop the current container.
#   2. Delete/Remove the old container instance.
#   3. Optionally prune the now unused image. (I always do this)
#   4. Download/Pull the latest image from the registry.
#   5. Re-create/Start the container using your existing settings.
#
# Docke specific UI's all have simple options/buttons for this:
# - QNAP Container Station: Click "Recreate" 
# - Portainer: ??
# - Synology: ??
#
# METHOD B: COMMAND LINE / LINUX USERS (Clean Slate Update)
# Navigate to the folder containing this file and run the following in order:
#
# 1. docker compose down
# 2. docker compose pull
# 3. docker compose up -d
# 4. docker image prune -f
# ================================================================================

services:
  bose-hybrid:
    image: ghcr.io/tjgigs/bose-soundtouch-hybrid-2026:v3.8.1
    
    container_name: bose-soundtouch-hybrid
    network_mode: "host"
    environment:
      - NODE_ENV=production
      - TRUST_PROXY=${TRUST_PROXY:-false} 

      # ==========================================================
      # TIMEZONE SETTING (REQUIRED FOR ACCURATE LOGS)
      # Find your exact timezone format here: https://nodatime.org/TimeZones
      # Example: America/New_York, Europe/London, Australia/Sydney
      # ==========================================================
      - TZ=America/Los_Angeles  # <-- Change this to your local timezone    
    
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      
      # ==================================================
      # VOLUME CONFIGURATION: CHOOSE METHOD A OR METHOD B
      # ==================================================
      
      # METHOD A: For Plain Docker Compose / CLI Users (Standard Active)
      - ./:/app/config   
      
      ###############################################################################
      # METHOD B: For NAS GUI Users (QNAP / Synology / Portainer Web)
      # INSTRUCTIONS: Some Web interfaces require absolute paths. Like my QNAP 
      # because it does not know exactly where you saved this file and folder on your NAS
      # YOU MUST change the text on the LEFT side of the colon to your actual absolute path.
      # Leave the right side (:/app/config) exactly as it is.
      #
      # IMPORTANT: If you use this method, you MUST comment out (add a '#' to) 
      # the "METHOD A" line above to prevent mapping conflicts.
      #
      # Example: Uncomment and edit the line below:
      ################################################################################
      
      # - /your/actual/absolute/path/here:/app/config
 
    restart: unless-stopped